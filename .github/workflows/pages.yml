name: Build Jarvis PWA files

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build static app
        run: npm run build

      - name: Upload downloadable app files
        uses: actions/upload-artifact@v4
        with:
          name: jarvis-pwa-files
          path: dist
