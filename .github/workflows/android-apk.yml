name: Build Jarvis APK

on:
  push:
    branches: [work, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Restore APK signing keystore
        run: base64 --decode app/jarvis-upload-keystore.jks.base64 > app/jarvis-upload-keystore.jks

      - name: Build signed APK
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: gradle :app:assembleRelease -PjarvisVersionCode=${{ github.run_number }}

      - name: Prepare phone download file
        run: |
          mkdir -p dist-apk
          cp app/build/outputs/apk/release/app-release.apk dist-apk/Jarvis.apk
          printf '{"versionCode":%s,"apk":"Jarvis.apk"}\n' '${{ github.run_number }}' > dist-apk/version.json

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete jarvis-latest --cleanup-tag --yes || true
          gh release create jarvis-latest dist-apk/Jarvis.apk dist-apk/version.json --title 'Jarvis latest APK' --notes 'versionCode=${{ github.run_number }}' --latest

      - name: Upload APK to download on phone
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-apk
          path: dist-apk/Jarvis.apk
