name: Build Jarvis APK

on:
  push:
    branches: [work, main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager 'platforms;android-35' 'build-tools;35.0.0'

      - name: Build debug APK
        run: gradle :app:assembleDebug -PversionCode=${{ github.run_number }}

      - name: Prepare phone download file
        run: |
          mkdir -p dist-apk
          cp app/build/outputs/apk/debug/app-debug.apk dist-apk/Jarvis.apk
          printf '{"versionCode":%s,"apk":"Jarvis.apk"}\n' '${{ github.run_number }}' > dist-apk/version.json

      - name: Publish latest APK release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete jarvis-latest --cleanup-tag --yes || true
          gh release create jarvis-latest dist-apk/Jarvis.apk dist-apk/version.json --title 'Jarvis latest APK' --notes 'versionCode=${{ github.run_number }}' --latest

      - name: Upload APK to download on phone
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-apk
          path: dist-apk/Jarvis.apk
