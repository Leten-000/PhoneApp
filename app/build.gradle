plugins {
    id 'com.android.application'
}

android {
    namespace 'pl.jarvis'
    compileSdk 35

    defaultConfig {
        applicationId 'pl.jarvis'
        minSdk 23
        targetSdk 35
        versionCode (project.findProperty('versionCode') ?: '1').toInteger()
        versionName '0.1.0'
    }
}
