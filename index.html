<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Jarvis - prywatna aplikacja na telefon." />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/styles.css" />
    <title>Jarvis</title>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="card">
        <p class="eyebrow">Jarvis</p>
        <h1 id="app-title">aplikacja działa</h1>
        <p class="hint">
          Dodaj tę stronę do ekranu głównego telefonu, aby korzystać z niej jak z aplikacji.
          Po wdrożeniu nowych wersji przeglądarka sama pobierze aktualizacje.
        </p>
      </section>
    </main>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js');
        });
      }
    </script>
  </body>
</html>
